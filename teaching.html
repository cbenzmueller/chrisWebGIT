<style>
  :root {
    --bg:          #f5f4f0;
    --surface:     #ffffff;
    --border:      #dedad4;
    --border2:     #c8c3bb;
    --accent:      #2c5f8a;

    --text-dim:    #9a948d;
    --lecture:     #b45309;

    --project:     #6d28d9;

  /* ── HEADER ── */

    color: var(--accent); margin-bottom: .7rem;
  }
  h1 {
    font-family: 'EB Garamond', serif;
    font-size: clamp(2rem, 5vw, 3.4rem);

  }
  .subtitle { color: var(--text-muted); font-size: .92rem; margin-bottom: 1.8rem; }
  /* ── TOOLBAR ── */
  .toolbar {
    position: sticky; top: 3rem; z-index: 100;
    background: rgba(245,244,240,.96); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); padding: .6rem 2rem;
  }
  .toolbar-inner { max-width: 980px; margin: 0 auto; display: flex; gap: .55rem; align-items: center; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 160px; position: relative; }
  .search-wrap svg { position: absolute; left: .7rem; top: 50%; transform: translateY(-50%); color: var(--text-dim); pointer-events: none; }
  input[type="search"] {
    width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: 'Source Sans 3', sans-serif; font-size: .88rem;
    padding: .42rem .7rem .42rem 2rem; outline: none; transition: border-color .15s, box-shadow .15s;
  }
  input[type="search"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  input[type="search"]::placeholder { color: var(--text-dim); }
  select {

  .tb-btn {

  /* ── MAIN ── */
  main { max-width: 980px; margin: 1.5rem auto; padding: 0 2rem 5rem; }
  .year-group { margin-bottom: 2rem; }
  .year-heading {

  .yr { font-family: 'EB Garamond', serif; font-size: 1.4rem; font-weight: 500; color: var(--text); line-height: 1; }
  .year-count { font-size: .75rem; color: var(--text-dim); }

  /* ── COURSE ROW ── */
  .course-row {
    padding: .35rem 0 .35rem .6rem;
    border-left: 3px solid transparent; margin-bottom: .15rem;
  }
  .course-row[data-cat="lecture"] { border-left-color: var(--lecture); }
  .course-row[data-cat="seminar"] { border-left-color: var(--seminar); }
  .course-row[data-cat="project"] { border-left-color: var(--project); }
  .course-row[data-cat="bundle"]  { border-left-color: var(--bundle); }
  .course-row[data-cat="other"]   { border-left-color: var(--other); }
  [data-cat="lecture"]
  [data-cat="seminar"]
  [data-cat="project"]
  [data-cat="bundle"]
  [data-cat="other"]
  .course-body { min-width: 0; }
  .course-title {

  .course-title a { color: inherit; text-decoration: none; border-bottom: 1px solid transparent; transition: color .15s, border-color .15s; }

  /* action links */
  .course-actions { display: flex; align-items: center; gap: .3rem; margin-top: .22rem; flex-wrap: wrap; }

    font-family: 'JetBrains Mono', monospace; font-size: .62rem;

  .act-link.url-link { border-color: rgba(44,95,138,.35); color: var(--accent); }
  .act-link.url-link:hover { background: var(--accent-soft); }
  .act-link.bib-toggle.open { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

  /* BibTeX dropdown */
  .bib-box {
    display: none; margin-top: .35rem; position: relative;
    background: #f8f7f4; border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
  }
  .bib-box.open { display: block; }
  .bib-pre {
    font-family: 'JetBrains Mono', monospace; font-size: .7rem;
    line-height: 1.55; color: var(--text-muted);
    padding: .6rem .8rem; overflow-x: auto; white-space: pre;
    max-height: 260px; overflow-y: auto;
  }
  .bib-copy {
    position: absolute; top: .35rem; right: .45rem;
    font-family: 'JetBrains Mono', monospace; font-size: .6rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-dim); padding: .1rem .45rem; cursor: pointer; transition: all .12s;
  }
  .bib-copy:hover { border-color: var(--accent); color: var(--accent); }

  /* ── STATUS ── */
  .status-box { text-align: center; padding: 5rem 2rem; color: var(--text-muted); }
  .loading-ring {
    display: inline-block; width: 36px; height: 36px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 1rem;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center; padding: 1.3rem 2rem;
    color: var(--text-dim); font-size: .76rem;
    border-top: 1px solid var(--border); background: var(--surface);
  }
  footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 580px) {
    header { padding: 2rem 1rem 1.5rem; }
    main { padding-left: 1rem; padding-right: 1rem; }
    .toolbar { padding: .5rem 1rem; }
  .stat:nth-child(3n+1), .stat:nth-child(3n+2) { border-right: 1px solid var(--border); }
  }

  /* ── TOP NAV ── */
  nav {
    background: var(--surface);

    padding: 0 2rem;
    position: sticky; top: 0; z-index: 200;

  .nav-inner {

  }
  .nav-name {
    font-family: 'EB Garamond', serif;
    font-size: 1.1rem; font-weight: 500;
    color: var(--text); text-decoration: none; white-space: nowrap;

  .nav-links { display: flex; gap: .15rem; flex-wrap: wrap; }
  .nav-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: .67rem; letter-spacing: .04em; text-transform: uppercase;
    color: var(--text-muted); text-decoration: none;
    padding: .35rem .65rem; border-radius: 6px; transition: all .15s;
  }
  .nav-link:hover { background: var(--accent-soft); color: var(--accent); }
  .nav-link.active { color: var(--accent); background: var(--accent-soft); }
  @media (max-width: 580px) {
    nav { padding: 0 .75rem; }
    .nav-inner { flex-direction: column; align-items: flex-start;
                 height: auto; padding: .4rem 0; gap: .25rem; }
    .nav-name { font-size: .9rem; }
    .nav-link { padding: .25rem .45rem; font-size: .6rem; }
  }
</style>

<footer>
  Live data from <a href="https://page.mi.fu-berlin.de/cbenzmueller/papers/teaching.bib" target="_blank">teaching.bib</a>

<script>
const BIB_URL = 'papers/teaching.bib';
let allCourses = [], sortAsc = false, activeCat = 'all', activeYear = '', query = '';

// ── LaTeX cleaner ─────────────────────────────────────────────────────────
const UMLAUT = {a:'ä',o:'ö',u:'ü',A:'Ä',O:'Ö',U:'Ü',e:'ë',E:'Ë',i:'ï',I:'Ï'};
const ACUTE  = {a:'á',e:'é',i:'í',o:'ó',u:'ú',A:'Á',E:'É',I:'Í',O:'Ó',U:'Ú',y:'ý',Y:'Ý',c:'ć',C:'Ć',n:'ń',N:'Ń',s:'ś',S:'Ś',z:'ź',Z:'Ź'};
const GRAVE  = {a:'à',e:'è',i:'ì',o:'ò',u:'ù',A:'À',E:'È',I:'Ì',O:'Ò',U:'Ù'};
const CIRC   = {a:'â',e:'ê',i:'î',o:'ô',u:'û',A:'Â',E:'Ê',I:'Î',O:'Ô',U:'Û'};
const TILDE  = {n:'ñ',N:'Ñ',a:'ã',o:'õ',A:'Ã',O:'Õ'};

function cleanLatex(s) {
  if (!s) return '';
  return s
    .replace(/\{\\"\{?\s*([a-zA-Z])\s*\}?\}/g, (_,c) => UMLAUT[c]||c)
    .replace(/\\"\{([a-zA-Z])\}/g,              (_,c) => UMLAUT[c]||c)
    .replace(/\{"?\\"\s*([a-zA-Z])\}/g,         (_,c) => UMLAUT[c]||c)
    .replace(/\\"\s*([a-zA-Z])/g,               (_,c) => UMLAUT[c]||c)
    .replace(/\{\\'\{?\s*([a-zA-Z])\s*\}?\}/g, (_,c) => ACUTE[c]||c)
    .replace(/\\'\{?\s*([a-zA-Z])\s*\}?/g,      (_,c) => ACUTE[c]||c)
    .replace(/\{\\`\{?\s*([a-zA-Z])\s*\}?\}/g, (_,c) => GRAVE[c]||c)
    .replace(/\\`\{?\s*([a-zA-Z])\s*\}?/g,      (_,c) => GRAVE[c]||c)
    .replace(/\{\\\^\{?\s*([a-zA-Z])\s*\}?\}/g,(_,c) => CIRC[c]||c)
    .replace(/\\\^\{?\s*([a-zA-Z])\s*\}?/g,    (_,c) => CIRC[c]||c)
    .replace(/\{\\~\{?\s*([a-zA-Z])\s*\}?\}/g, (_,c) => TILDE[c]||c)
    .replace(/\\~\{?\s*([a-zA-Z])\s*\}?/g,     (_,c) => TILDE[c]||c)
    .replace(/\\c\{([cCsStT])\}/g, (_,c) => ({c:'ç',C:'Ç',s:'ş',S:'Ş',t:'ţ',T:'Ţ'}[c]||c))
    .replace(/\{?\\ss\}?/g, 'ß')
    .replace(/\{?\\ae\}?/gi, m => /A/.test(m)?'Æ':'æ')
    .replace(/\{?\\oe\}?/gi, m => /O/.test(m)?'Œ':'œ')
    .replace(/\{?\\aa\}?/gi, m => /A/.test(m)?'Å':'å')
    .replace(/---/g,'—').replace(/--/g,'–')
    .replace(/\\[a-zA-Z]+\s*/g,'')
    .replace(/\\/g,'')
    .replace(/\{|\}/g,'')
    .replace(/~/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}

// ── BibTeX parser ─────────────────────────────────────────────────────────
function extractValue(src, pos) {
  while (pos < src.length && /[ \t]/.test(src[pos])) pos++;
  if (src[pos] === '{') {
    let depth = 0, start = pos;
    while (pos < src.length) {
      if (src[pos] === '{') depth++;
      else if (src[pos] === '}') { depth--; if (!depth) { pos++; break; } }
      pos++;
    }
    return { val: src.slice(start+1, pos-1), end: pos };
  }
  if (src[pos] === '"') {
    let start = ++pos;
    while (pos < src.length && src[pos] !== '"') pos++;
    return { val: src.slice(start, pos), end: pos+1 };
  }
  let start = pos;
  while (pos < src.length && !/[,\s\}]/.test(src[pos])) pos++;
  return { val: src.slice(start, pos), end: pos };
}

// Extract all links from HTML in annote/note fields
function extractLinks(raw) {
  if (!raw) return [];
  const links = [];
  const re = /<a\s[^>]*href="([^"]+)"[^>]*>([^<]+)<\/a>/gi;
  let m;
  while ((m = re.exec(raw)) !== null) {
    links.push({ url: m[1].trim(), label: m[2].trim() });
  }
  return links;
}

// Categorize from keywords field
function categorize(kw) {
  if (!kw) return 'other';
  const k = kw.toLowerCase();
  // "Courses..." bundle entries
  if (k.includes('project practicum') || k.includes('project')) return 'project';
  if (k.includes('lecture')) return 'lecture';
  if (k.includes('seminar') || k.includes('bachelor seminar') || k.includes('bachelor project')) return 'seminar';
  if (k.includes('software project')) return 'project';
  return 'other';
}

// Detect semester bundle entries (key starts with "Courses")
function isBundle(key) {
  return /^[Cc]ourses/.test(key);
}

const SKIP = new Set(['keywords','bibsource','addendum','copyright','abstract','isbn','issn','urn','adress']);
function isSkipped(name) {
  const lo = name.toLowerCase();
  return lo.startsWith('opt') || (lo.startsWith('ot') && lo !== 'other') || SKIP.has(lo);
}

function sanitizeBib(type, key, rest) {
  const lines = [];
  const fnRe = /\b([A-Za-z_]\w*)\s*=/g;
  let fm;
  while ((fm = fnRe.exec(rest)) !== null) {
    const fname = fm[1]; const flo = fname.toLowerCase();
    if (isSkipped(fname)) {
      const eqPos = fm.index + fm[0].length;
      try { const {end} = extractValue(rest, eqPos); fnRe.lastIndex = end; } catch(_) {}
      continue;
    }
    const eqPos = fm.index + fm[0].length;
    try {
      const { val, end } = extractValue(rest, eqPos);
      fnRe.lastIndex = end;
      let trimmed = val.trim();
      if (!trimmed) continue;
      // Strip HTML from annote/note
      if (flo === 'annote' || flo === 'note') {
        const parts = [];
        const re = /<a\s[^>]*href="([^"]+)"[^>]*>([^<]+)<\/a>/gi;
        let m;
        while ((m = re.exec(trimmed)) !== null) parts.push(m[2].trim() + ': ' + m[1].trim());
        trimmed = parts.length > 0 ? parts.join('; ') : trimmed.replace(/<[^>]+>/g,'').trim();
        if (!trimmed) continue;
      }
      try { const formatted = String(parseInt(trimmed,10)) === trimmed ? trimmed : '{'+trimmed+'}';
            lines.push(`  ${flo.padEnd(12)} = ${formatted}`); }
      catch(_) { lines.push(`  ${flo.padEnd(12)} = {${trimmed}}`); }
    } catch(_) {}
  }
  return `@${type}{${key},\n${lines.join(',\n')}\n}`;
}

function parseCourses(raw) {
  const entries = [];
  const re = /@(\w+)\s*\{/gi;
  let m;
  while ((m = re.exec(raw)) !== null) {
    const type = m[1].toLowerCase();
    if (['string','comment','preamble'].includes(type)) continue;
    let i = m.index + m[0].length;
    let depth = 1, bodyStart = i;
    while (i < raw.length && depth > 0) {
      if (raw[i] === '{') depth++;
      else if (raw[i] === '}') depth--;
      i++;
    }
    const body = raw.slice(bodyStart, i-1);
    const comma = body.indexOf(',');
    if (comma < 0) continue;
    const key = body.slice(0, comma).trim();
    const rest = body.slice(comma+1);

    const entry = { type, key };
    let rawNote = '', rawAnnote = '';
    const fnRe = /\b([A-Za-z_]\w*)\s*=/g;
    let fm;
    while ((fm = fnRe.exec(rest)) !== null) {
      const fname = fm[1].toLowerCase();
      const eqPos = fm.index + fm[0].length;
      try {
        const { val, end } = extractValue(rest, eqPos);
        fnRe.lastIndex = end;
        if (fname === 'note')   rawNote   = val;
        if (fname === 'annote') rawAnnote = val;
        if (!isSkipped(fname) && val) entry[fname] = cleanLatex(val);
      } catch(_) {}
    }

    if (!entry.title || !entry.year) continue;

    // Collect links from both note and annote
    entry.links = [...extractLinks(rawNote), ...extractLinks(rawAnnote)];
    // Also use direct url field
    if (entry.url && !entry.links.find(l => l.url === entry.url)) {
      entry.links.unshift({ url: entry.url, label: 'Link ↗' });
    }

    // Category
    if (isBundle(key)) {
      entry.cat = 'bundle';
    } else {
      entry.cat = categorize(entry.keywords);
    }

    entry._raw = sanitizeBib(type, key, rest);
    entries.push(entry);
  }
  return entries;
}

// ── Labels ────────────────────────────────────────────────────────────────
function catLabel(c) {
  return { lecture:'Lecture', seminar:'Seminar', project:'Project', bundle:'Semester Bundle', other:'Other' }[c] || 'Other';
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toggleBib(id, btn) {
  const box = document.getElementById(id);
  const open = box.classList.toggle('open');
  btn.classList.toggle('open', open);
}
function copyBib(id) {
  const text = document.getElementById(id).querySelector('.bib-pre').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(id).querySelector('.bib-copy');
    const prev = btn.textContent; btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = prev, 1500);
  });
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  let courses = [...allCourses];
  if (activeCat !== 'all') courses = courses.filter(c => c.cat === activeCat);
  if (activeYear) courses = courses.filter(c => c.year === activeYear);
  if (query) {
    const q = query.toLowerCase();
    courses = courses.filter(c =>
      [c.title, c.publisher, c.note, c.author].some(f => f && f.toLowerCase().includes(q))
    );
  }
  courses.sort((a,b) => sortAsc ? +a.year - +b.year : +b.year - +a.year);

  const main = document.getElementById('main');
  if (!courses.length) {
    main.innerHTML = '<div class="status-box"><p>No courses match your current filters.</p></div>';
    return;
  }
  const byYear = {};
  courses.forEach(c => (byYear[c.year] = byYear[c.year]||[]).push(c));
  const years = Object.keys(byYear).sort((a,b) => sortAsc ? +a-+b : +b-+a);

  main.innerHTML = years.map(yr => `
    <div class="year-group">
      <div class="year-heading">
        <span class="yr">${yr}</span>
        <span class="year-count">${byYear[yr].length} course${byYear[yr].length>1?'s':''}</span>
      </div>
      ${byYear[yr].map(courseRow).join('')}
    </div>`).join('');
}

function courseRow(c) {
  // Title: if bundle with a url, make it a link directly
  const mainUrl = c.url || (c.links.length === 1 ? c.links[0].url : null);
  const titleHtml = mainUrl
    ? `<a href="${mainUrl}" target="_blank" rel="noopener">${c.title}</a>`
    : c.title;

  // Meta line: publisher + note
  const metaParts = [];
  if (c.publisher) metaParts.push(c.publisher);
  if (c.note) metaParts.push(`<span style="font-style:italic">${c.note}</span>`);
  const meta = metaParts.join(' · ');

  // Action links
  const acts = [];
  c.links.forEach(l => {
    const label = l.label.length > 20 ? l.label.slice(0,18)+'…' : l.label;
    acts.push(`<a class="act-link url-link" href="${l.url}" target="_blank" rel="noopener">${label} ↗</a>`);
  });
  const bibId = 'bib-' + c.key.replace(/[^a-zA-Z0-9]/g,'_');
  acts.push(`<button class="act-link bib-toggle" onclick="toggleBib('${bibId}',this)">BibTeX</button>`);

  return `
  <div class="course-row" data-cat="${c.cat}">
    <div class="course-body">
      <div class="course-title">${titleHtml}</div>
      ${meta ? `<div class="course-meta">${meta}</div>` : ''}
      <div class="course-actions">${acts.join('')}</div>
      <div class="bib-box" id="${bibId}">
        <pre class="bib-pre">${escHtml(c._raw)}</pre>
        <button class="bib-copy" onclick="copyBib('${bibId}')">Copy</button>
      </div>
    </div>
  </div>`;
}


function updateYearFilter() {
  const years = [...new Set(allCourses.map(c=>c.year))].sort((a,b)=>+b-+a);
  document.getElementById('yearFilter').innerHTML =
    '<option value="">All Years</option>' + years.map(y=>`<option value="${y}">${y}</option>`).join('');
}

async function loadBib() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('main').innerHTML =
    '<div class="status-box"><div class="loading-ring"></div><p>Fetching teaching activities…</p></div>';
  try {
    const res = await fetch(BIB_URL + '?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allCourses = parseCourses(await res.text()); updateYearFilter(); render();
    document.getElementById('lastUpdated').textContent = 'Fetched ' + new Date().toLocaleString();
  } catch(err) {
    document.getElementById('main').innerHTML =
      `<div class="status-box"><p>⚠️ Could not load teaching data.<br><small>${err.message}</small></p></div>`;
  } finally { btn.classList.remove('spinning'); }
}

document.getElementById('searchInput').addEventListener('input', e => { query = e.target.value; render(); });
document.getElementById('yearFilter').addEventListener('change', e => { activeYear = e.target.value; render(); });
document.getElementById('sortBtn').addEventListener('click', () => {
  sortAsc = !sortAsc;
  document.getElementById('sortBtn').textContent = sortAsc ? '↑ Oldest first' : '↓ Newest first';
  render();
});
document.getElementById('refreshBtn').addEventListener('click', loadBib);


loadBib();
</script>
</body>
</html>
