<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christoph Benzmüller — Publications</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e2a;
    --border: #252a38;
    --accent: #6e9ef5;
    --accent2: #a78bfa;
    --accent3: #34d399;
    --text: #e8ecf4;
    --text-muted: #7a8299;
    --text-dim: #4a5068;
    --journal: #fbbf24;
    --conference: #6e9ef5;
    --book: #a78bfa;
    --preprint: #34d399;
    --other: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Figtree', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    padding: 5rem 2rem 3rem;
    text-align: center;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(110,158,245,.13) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 80% 100%, rgba(167,139,250,.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .header-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: .75rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
    opacity: .8;
  }
  h1 {
    font-family: 'EB Garamond', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 500;
    letter-spacing: -.02em;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: .75rem;
  }
  .subtitle {
    color: var(--text-muted);
    font-size: 1rem;
    font-weight: 300;
    max-width: 500px;
    margin: 0 auto 2.5rem;
  }
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 2.5rem;
    flex-wrap: wrap;
  }
  .stat {
    text-align: center;
  }
  .stat-n {
    font-family: 'EB Garamond', serif;
    font-size: 2.2rem;
    font-weight: 500;
    color: var(--accent);
    line-height: 1;
    display: block;
  }
  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: .65rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* ── TOOLBAR ── */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,15,20,.9);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: .9rem 2rem;
  }
  .toolbar-inner {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-wrap {
    flex: 1;
    min-width: 180px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: .8rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
  }
  input[type="search"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Figtree', sans-serif;
    font-size: .9rem;
    padding: .55rem .8rem .55rem 2.3rem;
    outline: none;
    transition: border-color .2s;
  }
  input[type="search"]:focus { border-color: var(--accent); }
  input[type="search"]::placeholder { color: var(--text-dim); }

  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Figtree', sans-serif;
    font-size: .85rem;
    padding: .55rem .9rem;
    outline: none;
    cursor: pointer;
    transition: border-color .2s;
  }
  select:focus { border-color: var(--accent); }

  .sort-toggle {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: .75rem;
    padding: .55rem .9rem;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .sort-toggle:hover { border-color: var(--accent); color: var(--accent); }

  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    padding: .55rem .7rem;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
  }
  .refresh-btn:hover { border-color: var(--accent3); color: var(--accent3); }
  .refresh-btn.spinning svg { animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TYPE FILTERS ── */
  .type-filters {
    max-width: 960px;
    margin: 1.5rem auto 0;
    padding: 0 2rem;
    display: flex;
    gap: .5rem;
    flex-wrap: wrap;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    padding: .3rem .8rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    font-size: .78rem;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all .2s;
    color: var(--text-muted);
    background: transparent;
    user-select: none;
  }
  .chip:hover { border-color: var(--text-muted); color: var(--text); }
  .chip.active { color: #0d0f14; font-weight: 500; }
  .chip[data-type="all"].active { background: var(--text); border-color: var(--text); }
  .chip[data-type="article"].active { background: var(--journal); border-color: var(--journal); }
  .chip[data-type="inproceedings"].active { background: var(--conference); border-color: var(--conference); }
  .chip[data-type="incollection"].active { background: var(--book); border-color: var(--book); }
  .chip[data-type="book"].active { background: var(--book); border-color: var(--book); }
  .chip[data-type="misc"].active { background: var(--preprint); border-color: var(--preprint); }
  .chip[data-type="other"].active { background: var(--other); border-color: var(--other); }
  .chip-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  /* ── MAIN CONTENT ── */
  main {
    max-width: 960px;
    margin: 2rem auto;
    padding: 0 2rem 4rem;
  }

  .year-group { margin-bottom: 3.5rem; }
  .year-heading {
    font-family: 'EB Garamond', serif;
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--text-dim);
    letter-spacing: .1em;
    border-bottom: 1px solid var(--border);
    padding-bottom: .5rem;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: .75rem;
  }
  .year-heading span:first-child {
    font-size: 1.6rem;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0;
  }
  .year-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: .68rem;
    color: var(--text-dim);
    letter-spacing: .05em;
  }

  /* ── PUBLICATION CARD ── */
  .pub-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.4rem;
    margin-bottom: .75rem;
    transition: border-color .2s, transform .15s;
    position: relative;
    overflow: hidden;
  }
  .pub-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 12px 0 0 12px;
  }
  .pub-card[data-type="article"]::before { background: var(--journal); }
  .pub-card[data-type="inproceedings"]::before { background: var(--conference); }
  .pub-card[data-type="incollection"]::before { background: var(--book); }
  .pub-card[data-type="book"]::before { background: var(--book); }
  .pub-card[data-type="misc"]::before { background: var(--preprint); }
  .pub-card[data-type="other"]::before { background: var(--other); }
  .pub-card:hover { border-color: #353a52; transform: translateY(-1px); }

  .pub-meta {
    display: flex;
    align-items: center;
    gap: .5rem;
    margin-bottom: .55rem;
    flex-wrap: wrap;
  }
  .type-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: .63rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: .15rem .55rem;
    border-radius: 4px;
    font-weight: 500;
  }
  [data-type="article"] .type-badge { background: rgba(251,191,36,.12); color: var(--journal); }
  [data-type="inproceedings"] .type-badge { background: rgba(110,158,245,.12); color: var(--conference); }
  [data-type="incollection"] .type-badge { background: rgba(167,139,250,.12); color: var(--book); }
  [data-type="book"] .type-badge { background: rgba(167,139,250,.12); color: var(--book); }
  [data-type="misc"] .type-badge { background: rgba(52,211,153,.12); color: var(--preprint); }
  [data-type="other"] .type-badge { background: rgba(248,113,113,.12); color: var(--other); }

  .pub-key {
    font-family: 'JetBrains Mono', monospace;
    font-size: .63rem;
    color: var(--text-dim);
  }
  .pub-venue {
    color: var(--text-muted);
    font-size: .8rem;
    margin-left: auto;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 260px;
  }

  .pub-title {
    font-family: 'EB Garamond', serif;
    font-size: 1.08rem;
    font-weight: 500;
    line-height: 1.35;
    color: var(--text);
    margin-bottom: .4rem;
  }
  .pub-title a {
    color: inherit;
    text-decoration: none;
    transition: color .2s;
  }
  .pub-title a:hover { color: var(--accent); }

  .pub-authors {
    font-size: .82rem;
    color: var(--text-muted);
    margin-bottom: .4rem;
  }

  .pub-details {
    font-size: .8rem;
    color: var(--text-dim);
    font-style: italic;
  }

  .pub-links {
    display: flex;
    gap: .5rem;
    margin-top: .7rem;
    flex-wrap: wrap;
  }
  .pub-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: .67rem;
    padding: .2rem .6rem;
    border-radius: 5px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    text-decoration: none;
    transition: all .18s;
    letter-spacing: .05em;
  }
  .pub-link:hover { border-color: var(--accent); color: var(--accent); }
  .pub-link.doi { border-color: rgba(110,158,245,.3); color: var(--accent); }
  .pub-link.doi:hover { background: rgba(110,158,245,.1); }

  /* ── EMPTY / LOADING ── */
  .status-box {
    text-align: center;
    padding: 5rem 2rem;
    color: var(--text-muted);
  }
  .status-box .icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    display: block;
    opacity: .4;
  }
  .loading-ring {
    display: inline-block;
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin-bottom: 1.5rem;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 2rem;
    color: var(--text-dim);
    font-size: .78rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: .05em;
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  @media (max-width: 600px) {
    header { padding: 3rem 1rem 2rem; }
    .pub-venue { display: none; }
    .toolbar-inner { gap: .5rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-label">Academic Publications</div>
  <h1>Christoph Benzmüller</h1>
  <p class="subtitle">Freie Universität Berlin — Logic, AI &amp; Automated Reasoning</p>
  <div class="stats-row" id="stats">
    <div class="stat"><span class="stat-n" id="stat-total">—</span><span class="stat-label">Publications</span></div>
    <div class="stat"><span class="stat-n" id="stat-years">—</span><span class="stat-label">Years Active</span></div>
    <div class="stat"><span class="stat-n" id="stat-journals">—</span><span class="stat-label">Journal Articles</span></div>
    <div class="stat"><span class="stat-n" id="stat-conf">—</span><span class="stat-label">Conference Papers</span></div>
  </div>
</header>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="searchInput" placeholder="Search titles, authors, venues…">
    </div>
    <select id="yearFilter"><option value="">All Years</option></select>
    <button class="sort-toggle" id="sortBtn">↓ Newest First</button>
    <button class="refresh-btn" id="refreshBtn" title="Reload from source">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
    </button>
  </div>
</div>

<div class="type-filters" id="typeFilters">
  <button class="chip active" data-type="all"><span class="chip-dot"></span>All</button>
  <button class="chip" data-type="article"><span class="chip-dot" style="background:var(--journal)"></span>Journal</button>
  <button class="chip" data-type="inproceedings"><span class="chip-dot" style="background:var(--conference)"></span>Conference</button>
  <button class="chip" data-type="incollection"><span class="chip-dot" style="background:var(--book)"></span>Book Chapter</button>
  <button class="chip" data-type="misc"><span class="chip-dot" style="background:var(--preprint)"></span>Other/AFP</button>
</div>

<main id="main">
  <div class="status-box"><div class="loading-ring"></div><p>Loading publications…</p></div>
</main>

<footer>
  Live data from <a href="https://page.mi.fu-berlin.de/cbenzmueller/papers/chris.bib" target="_blank">chris.bib</a> &nbsp;·&nbsp; <span id="lastUpdated"></span>
</footer>

<script>
// ── CORS PROXY ──────────────────────────────────────────────────────────────
// The BibTeX file is on a different origin, so we use a public CORS proxy.
const BIB_URL = 'https://page.mi.fu-berlin.de/cbenzmueller/papers/chris.bib';
const PROXY   = 'https://corsproxy.io/?url=';

// ── STATE ────────────────────────────────────────────────────────────────────
let allPubs    = [];
let sortAsc    = false;   // newest first by default
let activeType = 'all';
let activeYear = '';
let query      = '';

// ── BIB PARSER ───────────────────────────────────────────────────────────────
function parseBib(raw) {
  const entries = [];
  // Split on @ signs that start entries
  const chunks = raw.split(/\n@/);
  for (let chunk of chunks) {
    chunk = chunk.trim();
    if (!chunk || chunk.startsWith('%')) continue;
    // Reconstruct full entry
    if (!chunk.startsWith('@')) chunk = '@' + chunk;

    const typeMatch = chunk.match(/^@(\w+)\s*\{/i);
    if (!typeMatch) continue;
    const type = typeMatch[1].toLowerCase();

    // Extract key
    const keyMatch = chunk.match(/^@\w+\s*\{([^,\s]+)/i);
    const key = keyMatch ? keyMatch[1] : '';

    // Extract fields using a robust regex
    const entry = { type, key };
    // Remove outer @type{key, ... }
    const inner = chunk.replace(/^@\w+\s*\{[^,]+,/, '').replace(/\}\s*$/, '');

    // Field parser: handles {}, "", and bare numbers
    const fieldRe = /(\w+)\s*=\s*(?:\{([\s\S]*?)\}(?!\s*\w+\s*=)|\{([\s\S]*?\})\}|"([\s\S]*?)"(?=\s*[,\}])|(\d+)(?=\s*[,\}]))/g;
    let m;
    while ((m = fieldRe.exec(inner)) !== null) {
      const fname = m[1].toLowerCase();
      if (fname.startsWith('opt')) continue; // skip OPT fields
      const val = (m[2] ?? m[3] ?? m[4] ?? m[5] ?? '').trim();
      entry[fname] = cleanLatex(val);
    }
    if (entry.title && entry.year) entries.push(entry);
  }
  return entries;
}

function cleanLatex(s) {
  return s
    .replace(/\\"\{([aouAOU])\}/g, (_, c) => ({'a':'ä','o':'ö','u':'ü','A':'Ä','O':'Ö','U':'Ü'}[c]||c))
    .replace(/\{\\"\s*([aouAOUeEiI])\}/g, (_, c) => ({'a':'ä','o':'ö','u':'ü','A':'Ä','O':'Ö','U':'Ü','e':'ë','E':'Ë','i':'ï','I':'Ï'}[c]||c))
    .replace(/\\"\s*([aouAOU])/g, (_, c) => ({'a':'ä','o':'ö','u':'ü','A':'Ä','O':'Ö','U':'Ü'}[c]||c))
    .replace(/\{\\ss\}/g, 'ß').replace(/\\ss\b/g, 'ß')
    .replace(/\\'([aeiouAEIOU])/g, (_, c) => c)
    .replace(/\\`([aeiouAEIOU])/g, (_, c) => c)
    .replace(/\\~([nN])/g, (_, c) => c === 'n' ? 'ñ' : 'Ñ')
    .replace(/\\\^([aeiouAEIOU])/g, (_, c) => c)
    .replace(/\\c\{([cC])\}/g, (_, c) => c === 'c' ? 'ç' : 'Ç')
    .replace(/\{([^}]*)\}/g, '$1')
    .replace(/~/, ' ')
    .replace(/\\,/g, ' ')
    .replace(/---/g, '—')
    .replace(/--/g, '–')
    .trim();
}

function typeLabel(t) {
  return { article:'Journal Article', inproceedings:'Conference', incollection:'Book Chapter',
           book:'Book', phdthesis:'PhD Thesis', mastersthesis:'Master\'s Thesis',
           misc:'Other', techreport:'Tech Report' }[t] || t.charAt(0).toUpperCase()+t.slice(1);
}

function venueStr(p) {
  if (p.journal) return p.journal + (p.volume ? ' '+p.volume : '');
  if (p.booktitle) return p.booktitle.slice(0, 60) + (p.booktitle.length > 60 ? '…' : '');
  if (p.school) return p.school;
  if (p.institution) return p.institution;
  return '';
}

function detailStr(p) {
  const parts = [];
  if (p.journal) { parts.push(`<em>${p.journal}</em>`); if (p.volume) parts.push(`vol. ${p.volume}`); if (p.number) parts.push(`no. ${p.number}`); }
  if (p.booktitle && !p.journal) parts.push(`<em>${p.booktitle}</em>`);
  if (p.pages) parts.push(`pp. ${p.pages}`);
  if (p.publisher) parts.push(p.publisher);
  if (p.note) parts.push(p.note);
  return parts.join(' · ');
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  let pubs = [...allPubs];

  // Filter
  if (activeType !== 'all') pubs = pubs.filter(p => p.type === activeType);
  if (activeYear) pubs = pubs.filter(p => p.year === activeYear);
  if (query) {
    const q = query.toLowerCase();
    pubs = pubs.filter(p =>
      (p.title||'').toLowerCase().includes(q) ||
      (p.author||'').toLowerCase().includes(q) ||
      (p.journal||'').toLowerCase().includes(q) ||
      (p.booktitle||'').toLowerCase().includes(q)
    );
  }

  // Sort
  pubs.sort((a,b) => sortAsc ? +a.year - +b.year : +b.year - +a.year);

  const main = document.getElementById('main');
  if (!pubs.length) {
    main.innerHTML = '<div class="status-box"><span class="icon">📭</span><p>No publications match your filters.</p></div>';
    return;
  }

  // Group by year
  const byYear = {};
  for (const p of pubs) {
    if (!byYear[p.year]) byYear[p.year] = [];
    byYear[p.year].push(p);
  }
  const years = Object.keys(byYear).sort((a,b) => sortAsc ? +a - +b : +b - +a);

  main.innerHTML = years.map(yr => `
    <div class="year-group">
      <div class="year-heading">
        <span>${yr}</span>
        <span class="year-count">${byYear[yr].length} publication${byYear[yr].length>1?'s':''}</span>
      </div>
      ${byYear[yr].map(p => pubCard(p)).join('')}
    </div>
  `).join('');
}

function pubCard(p) {
  const href = p.doi ? `https://doi.org/${p.doi}` : (p.url || null);
  const titleHtml = href
    ? `<a href="${href}" target="_blank" rel="noopener">${p.title||'Untitled'}</a>`
    : (p.title||'Untitled');

  const links = [];
  if (p.doi) links.push(`<a class="pub-link doi" href="https://doi.org/${p.doi}" target="_blank" rel="noopener">DOI</a>`);
  if (p.url && !p.doi) links.push(`<a class="pub-link" href="${p.url}" target="_blank" rel="noopener">URL</a>`);

  return `
    <div class="pub-card" data-type="${p.type}">
      <div class="pub-meta">
        <span class="type-badge">${typeLabel(p.type)}</span>
        <span class="pub-key">[${p.key}]</span>
        <span class="pub-venue">${venueStr(p)}</span>
      </div>
      <div class="pub-title">${titleHtml}</div>
      <div class="pub-authors">${p.author||''}</div>
      ${detailStr(p) ? `<div class="pub-details">${detailStr(p)}</div>` : ''}
      ${links.length ? `<div class="pub-links">${links.join('')}</div>` : ''}
    </div>
  `;
}

// ── STATS ────────────────────────────────────────────────────────────────────
function updateStats() {
  const years = [...new Set(allPubs.map(p => p.year))];
  document.getElementById('stat-total').textContent = allPubs.length;
  document.getElementById('stat-years').textContent = years.length;
  document.getElementById('stat-journals').textContent = allPubs.filter(p => p.type==='article').length;
  document.getElementById('stat-conf').textContent = allPubs.filter(p => p.type==='inproceedings').length;
}

function updateYearFilter() {
  const years = [...new Set(allPubs.map(p => p.year))].sort((a,b)=>+b-+a);
  const sel = document.getElementById('yearFilter');
  sel.innerHTML = '<option value="">All Years</option>' +
    years.map(y => `<option value="${y}">${y}</option>`).join('');
}

// ── LOAD ─────────────────────────────────────────────────────────────────────
async function loadBib() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('main').innerHTML =
    '<div class="status-box"><div class="loading-ring"></div><p>Fetching latest publications…</p></div>';
  try {
    const res = await fetch(PROXY + encodeURIComponent(BIB_URL));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.text();
    allPubs = parseBib(raw);
    updateStats();
    updateYearFilter();
    render();
    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      'Last fetched: ' + now.toLocaleString();
  } catch(err) {
    document.getElementById('main').innerHTML =
      `<div class="status-box"><span class="icon">⚠️</span><p>Could not load publications.<br><small>${err.message}</small></p></div>`;
  } finally {
    btn.classList.remove('spinning');
  }
}

// ── EVENTS ───────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  query = e.target.value; render();
});
document.getElementById('yearFilter').addEventListener('change', e => {
  activeYear = e.target.value; render();
});
document.getElementById('sortBtn').addEventListener('click', () => {
  sortAsc = !sortAsc;
  document.getElementById('sortBtn').textContent = sortAsc ? '↑ Oldest First' : '↓ Newest First';
  render();
});
document.getElementById('refreshBtn').addEventListener('click', loadBib);
document.getElementById('typeFilters').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeType = chip.dataset.type;
  render();
});

// ── INIT ─────────────────────────────────────────────────────────────────────
loadBib();
</script>
</body>
</html>
