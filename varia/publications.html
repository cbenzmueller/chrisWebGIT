<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christoph Benzmüller — Publications</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Source+Sans+3:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #f5f4f0;
    --surface:     #ffffff;
    --border:      #dedad4;
    --border2:     #c8c3bb;
    --accent:      #2c5f8a;
    --accent-soft: rgba(44,95,138,.09);
    --text:        #1a1a1a;
    --text-muted:  #5a5550;
    --text-dim:    #9a948d;
    --journal:     #b45309;
    --journal-bg:  rgba(180,83,9,.09);
    --conf:        #2c5f8a;
    --conf-bg:     rgba(44,95,138,.09);
    --book:        #6d28d9;
    --book-bg:     rgba(109,40,217,.09);
    --misc:        #1a7a4a;
    --misc-bg:     rgba(26,122,74,.09);
    --other:       #b91c1c;
    --other-bg:    rgba(185,28,28,.09);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    line-height: 1.65;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 3.5rem 2rem 2.5rem;
    text-align: center;
  }
  .header-kicker {
    font-family: 'JetBrains Mono', monospace;
    font-size: .68rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: .85rem;
  }
  h1 {
    font-family: 'EB Garamond', serif;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-weight: 500;
    letter-spacing: -.01em;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: .5rem;
  }
  .subtitle {
    color: var(--text-muted);
    font-size: .95rem;
    margin-bottom: 2.2rem;
  }
  .stats-row {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    background: var(--bg);
  }
  .stat {
    padding: .65rem 1.5rem;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }
  .stat-n {
    font-family: 'EB Garamond', serif;
    font-size: 1.9rem;
    font-weight: 500;
    color: var(--accent);
    line-height: 1;
    display: block;
  }
  .stat-label {
    font-size: .7rem;
    color: var(--text-dim);
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  /* TOOLBAR */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(245,244,240,.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: .75rem 2rem;
  }
  .toolbar-inner {
    max-width: 980px;
    margin: 0 auto;
    display: flex;
    gap: .65rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-wrap { flex: 1; min-width: 160px; position: relative; }
  .search-wrap svg {
    position: absolute; left: .75rem; top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim); pointer-events: none;
  }
  input[type="search"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-size: .9rem;
    padding: .48rem .75rem .48rem 2.1rem;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input[type="search"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  input[type="search"]::placeholder { color: var(--text-dim); }
  select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-size: .87rem;
    padding: .48rem .85rem;
    outline: none;
    cursor: pointer;
  }
  .tb-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: .72rem;
    padding: .48rem .85rem;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: .3rem;
  }
  .tb-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .refresh-btn.spinning svg { animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* CHIPS */
  .type-filters {
    max-width: 980px;
    margin: 1.2rem auto 0;
    padding: 0 2rem;
    display: flex;
    gap: .4rem;
    flex-wrap: wrap;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: .35rem;
    padding: .26rem .75rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    font-size: .77rem;
    font-family: 'Source Sans 3', sans-serif;
    cursor: pointer;
    transition: all .15s;
    color: var(--text-muted);
    background: var(--surface);
    user-select: none;
  }
  .chip:hover { border-color: var(--border2); color: var(--text); }
  .chip.active { font-weight: 600; border-width: 1.5px; }
  .chip[data-type="all"].active      { background: var(--text);       border-color: var(--text);    color: #fff; }
  .chip[data-type="article"].active  { background: var(--journal-bg); border-color: var(--journal); color: var(--journal); }
  .chip[data-type="inproceedings"].active { background: var(--conf-bg); border-color: var(--conf); color: var(--conf); }
  .chip[data-type="incollection"].active,
  .chip[data-type="book"].active     { background: var(--book-bg);    border-color: var(--book);    color: var(--book); }
  .chip[data-type="misc"].active     { background: var(--misc-bg);    border-color: var(--misc);    color: var(--misc); }
  .chip-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

  /* MAIN */
  main { max-width: 980px; margin: 2rem auto; padding: 0 2rem 5rem; }
  .year-group { margin-bottom: 2.8rem; }
  .year-heading {
    display: flex;
    align-items: baseline;
    gap: .7rem;
    border-bottom: 2px solid var(--border);
    padding-bottom: .35rem;
    margin-bottom: .9rem;
  }
  .yr { font-family: 'EB Garamond', serif; font-size: 1.5rem; font-weight: 500; color: var(--text); line-height: 1; }
  .year-count { font-size: .78rem; color: var(--text-dim); }

  /* PUB CARD */
  .pub-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.25rem 1rem 1.45rem;
    margin-bottom: .5rem;
    position: relative;
    transition: border-color .15s, box-shadow .15s;
  }
  .pub-card:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .pub-card::before {
    content: '';
    position: absolute;
    left: 0; top: 7px; bottom: 7px;
    width: 3px;
    border-radius: 0 2px 2px 0;
  }
  .pub-card[data-type="article"]::before      { background: var(--journal); }
  .pub-card[data-type="inproceedings"]::before { background: var(--conf); }
  .pub-card[data-type="incollection"]::before  { background: var(--book); }
  .pub-card[data-type="book"]::before          { background: var(--book); }
  .pub-card[data-type="proceedings"]::before   { background: var(--book); }
  .pub-card[data-type="misc"]::before          { background: var(--misc); }
  .pub-card[data-type="techreport"]::before,
  .pub-card[data-type="phdthesis"]::before     { background: var(--other); }

  .pub-meta { display: flex; align-items: center; gap: .45rem; margin-bottom: .4rem; flex-wrap: wrap; }
  .type-badge {
    font-size: .65rem;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
    padding: .1rem .5rem;
    border-radius: 4px;
  }
  [data-type="article"]      .type-badge { background: var(--journal-bg); color: var(--journal); }
  [data-type="inproceedings"] .type-badge { background: var(--conf-bg);    color: var(--conf); }
  [data-type="incollection"]  .type-badge { background: var(--book-bg);    color: var(--book); }
  [data-type="book"]          .type-badge { background: var(--book-bg);    color: var(--book); }
  [data-type="proceedings"]   .type-badge { background: var(--book-bg);    color: var(--book); }
  [data-type="misc"]          .type-badge { background: var(--misc-bg);    color: var(--misc); }
  [data-type="techreport"]    .type-badge { background: var(--other-bg);   color: var(--other); }
  [data-type="phdthesis"]     .type-badge { background: var(--other-bg);   color: var(--other); }

  .pub-key { font-family: 'JetBrains Mono', monospace; font-size: .61rem; color: var(--text-dim); }
  .pub-title {
    font-family: 'EB Garamond', serif;
    font-size: 1.07rem;
    font-weight: 500;
    line-height: 1.35;
    color: var(--text);
    margin-bottom: .28rem;
  }
  .pub-title a { color: inherit; text-decoration: none; border-bottom: 1px solid transparent; transition: color .15s, border-color .15s; }
  .pub-title a:hover { color: var(--accent); border-bottom-color: var(--accent); }
  .pub-authors { font-size: .87rem; color: var(--text-muted); margin-bottom: .22rem; }
  .pub-venue { font-size: .84rem; color: var(--text-muted); font-style: italic; }
  .pub-venue .vol-info { font-style: normal; color: var(--text-dim); }
  .pub-links { display: flex; gap: .4rem; margin-top: .55rem; flex-wrap: wrap; }
  .pub-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: .63rem;
    padding: .16rem .52rem;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    text-decoration: none;
    transition: all .15s;
  }
  .pub-link:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .pub-link.doi { border-color: rgba(44,95,138,.3); color: var(--accent); }

  /* STATUS */
  .status-box { text-align: center; padding: 5rem 2rem; color: var(--text-muted); }
  .loading-ring {
    display: inline-block; width: 40px; height: 40px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 1.2rem;
  }

  /* FOOTER */
  footer {
    text-align: center; padding: 1.5rem 2rem;
    color: var(--text-dim); font-size: .78rem;
    border-top: 1px solid var(--border); background: var(--surface);
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  @media (max-width: 580px) {
    header { padding: 2rem 1rem 1.5rem; }
    .stats-row { flex-wrap: wrap; }
    .stat { border-right: none; border-bottom: 1px solid var(--border); padding: .5rem 1rem; }
    main, .type-filters { padding-left: 1rem; padding-right: 1rem; }
    .toolbar { padding: .6rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-kicker">Academic Publications</div>
  <h1>Christoph Benzmüller</h1>
  <p class="subtitle">Freie Universität Berlin &nbsp;·&nbsp; Logic, AI &amp; Automated Reasoning</p>
  <div class="stats-row">
    <div class="stat"><span class="stat-n" id="stat-total">—</span><span class="stat-label">Total</span></div>
    <div class="stat"><span class="stat-n" id="stat-journals">—</span><span class="stat-label">Journal Articles</span></div>
    <div class="stat"><span class="stat-n" id="stat-conf">—</span><span class="stat-label">Conference Papers</span></div>
    <div class="stat"><span class="stat-n" id="stat-years">—</span><span class="stat-label">Years Active</span></div>
  </div>
</header>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="search-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="searchInput" placeholder="Search titles, authors, venues…">
    </div>
    <select id="yearFilter"><option value="">All Years</option></select>
    <button class="tb-btn" id="sortBtn">↓ Newest first</button>
    <button class="tb-btn refresh-btn" id="refreshBtn" title="Reload from source">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
      Refresh
    </button>
  </div>
</div>

<div class="type-filters" id="typeFilters">
  <button class="chip active" data-type="all"><span class="chip-dot"></span>All types</button>
  <button class="chip" data-type="article"><span class="chip-dot" style="background:var(--journal)"></span>Journal</button>
  <button class="chip" data-type="inproceedings"><span class="chip-dot" style="background:var(--conf)"></span>Conference</button>
  <button class="chip" data-type="incollection"><span class="chip-dot" style="background:var(--book)"></span>Book Chapter</button>
  <button class="chip" data-type="book"><span class="chip-dot" style="background:var(--book)"></span>Book / Proceedings</button>
  <button class="chip" data-type="misc"><span class="chip-dot" style="background:var(--misc)"></span>Preprint / Other</button>
</div>

<main id="main">
  <div class="status-box"><div class="loading-ring"></div><p>Loading publications…</p></div>
</main>

<footer>
  Live data from <a href="https://page.mi.fu-berlin.de/cbenzmueller/papers/chris.bib" target="_blank">chris.bib</a>
  &nbsp;·&nbsp; <span id="lastUpdated"></span>
</footer>

<script>
const BIB_URL = '../papers/chris.bib';
let allPubs = [], sortAsc = false, activeType = 'all', activeYear = '', query = '';

// ── LaTeX cleaner ──────────────────────────────────────────────────────────
const UMLAUT = {a:'ä',o:'ö',u:'ü',A:'Ä',O:'Ö',U:'Ü',e:'ë',E:'Ë',i:'ï',I:'Ï'};
const ACUTE  = {a:'á',e:'é',i:'í',o:'ó',u:'ú',A:'Á',E:'É',I:'Í',O:'Ó',U:'Ú',y:'ý',Y:'Ý',c:'ć',C:'Ć',n:'ń',N:'Ń',s:'ś',S:'Ś',z:'ź',Z:'Ź'};
const GRAVE  = {a:'à',e:'è',i:'ì',o:'ò',u:'ù',A:'À',E:'È',I:'Ì',O:'Ò',U:'Ù'};
const CIRC   = {a:'â',e:'ê',i:'î',o:'ô',u:'û',A:'Â',E:'Ê',I:'Î',O:'Ô',U:'Û'};
const TILDE  = {n:'ñ',N:'Ñ',a:'ã',o:'õ',A:'Ã',O:'Õ'};

function cleanLatex(s) {
  if (!s) return '';
  return s
    // Umlaut: all forms of \"x
    .replace(/\{\\"\{?\s*([a-zA-Z])\s*\}?\}/g, (_,c) => UMLAUT[c]||c)
    .replace(/\\"\{([a-zA-Z])\}/g,              (_,c) => UMLAUT[c]||c)
    .replace(/\{"?\\"\s*([a-zA-Z])\}/g,         (_,c) => UMLAUT[c]||c)
    .replace(/\\"\s*([a-zA-Z])/g,               (_,c) => UMLAUT[c]||c)
    // Acute: \'x
    .replace(/\{\\'\{?\s*([a-zA-Z])\s*\}?\}/g, (_,c) => ACUTE[c]||c)
    .replace(/\\'\{?\s*([a-zA-Z])\s*\}?/g,      (_,c) => ACUTE[c]||c)
    // Grave: \`x
    .replace(/\{\\`\{?\s*([a-zA-Z])\s*\}?\}/g, (_,c) => GRAVE[c]||c)
    .replace(/\\`\{?\s*([a-zA-Z])\s*\}?/g,      (_,c) => GRAVE[c]||c)
    // Circumflex: \^x
    .replace(/\{\\\^\{?\s*([a-zA-Z])\s*\}?\}/g,(_,c) => CIRC[c]||c)
    .replace(/\\\^\{?\s*([a-zA-Z])\s*\}?/g,    (_,c) => CIRC[c]||c)
    // Tilde: \~x
    .replace(/\{\\~\{?\s*([a-zA-Z])\s*\}?\}/g, (_,c) => TILDE[c]||c)
    .replace(/\\~\{?\s*([a-zA-Z])\s*\}?/g,     (_,c) => TILDE[c]||c)
    // Cedilla
    .replace(/\\c\{([cCsStT])\}/g, (_,c) => ({c:'ç',C:'Ç',s:'ş',S:'Ş',t:'ţ',T:'Ţ'}[c]||c))
    // Special letters
    .replace(/\{?\\ss\}?/g, 'ß')
    .replace(/\{?\\ae\}?/gi, m => /A/.test(m)?'Æ':'æ')
    .replace(/\{?\\oe\}?/gi, m => /O/.test(m)?'Œ':'œ')
    .replace(/\{?\\aa\}?/gi, m => /A/.test(m)?'Å':'å')
    // Dashes
    .replace(/---/g,'—').replace(/--/g,'–')
    // Strip remaining LaTeX
    .replace(/\\[a-zA-Z]+\s*/g,'')
    .replace(/\\/g,'')
    .replace(/\{|\}/g,'')
    .replace(/~/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}

// ── BibTeX parser (brace-counting, handles nesting) ────────────────────────
function extractValue(src, pos) {
  // skip whitespace
  while (pos < src.length && src[pos] === ' ' || src[pos] === '\t') pos++;
  if (src[pos] === '{') {
    let depth = 0, start = pos;
    while (pos < src.length) {
      if (src[pos] === '{') depth++;
      else if (src[pos] === '}') { depth--; if (!depth) { pos++; break; } }
      pos++;
    }
    return { val: src.slice(start+1, pos-1), end: pos };
  }
  if (src[pos] === '"') {
    let start = ++pos;
    while (pos < src.length && src[pos] !== '"') pos++;
    return { val: src.slice(start, pos), end: pos+1 };
  }
  // bare number / token
  let start = pos;
  while (pos < src.length && !/[,\s\}]/.test(src[pos])) pos++;
  return { val: src.slice(start, pos), end: pos };
}

function parseBib(raw) {
  const entries = [];
  const re = /@(\w+)\s*\{/gi;
  let m;
  while ((m = re.exec(raw)) !== null) {
    const type = m[1].toLowerCase();
    if (type === 'string' || type === 'comment' || type === 'preamble') continue;
    let i = m.index + m[0].length;
    // find outer close brace by depth
    let depth = 1, bodyStart = i;
    while (i < raw.length && depth > 0) {
      if (raw[i] === '{') depth++;
      else if (raw[i] === '}') depth--;
      i++;
    }
    const body = raw.slice(bodyStart, i-1);
    const comma = body.indexOf(',');
    if (comma < 0) continue;
    const key = body.slice(0, comma).trim();
    const rest = body.slice(comma+1);

    const entry = { type, key };
    const fnRe = /\b([A-Za-z_]\w*)\s*=/g;
    let fm;
    while ((fm = fnRe.exec(rest)) !== null) {
      const fname = fm[1].toLowerCase();
      if (/^opt|^ot[^h]|^keywords|^bibsource|^addendum/.test(fname)) continue;
      const eqPos = fm.index + fm[0].length - 1;
      try {
        const { val } = extractValue(rest, eqPos);
        if (val) entry[fname] = cleanLatex(val);
      } catch(_) {}
    }
    if (entry.title && entry.year) entries.push(entry);
  }
  return entries;
}

// ── Helpers ────────────────────────────────────────────────────────────────
function typeLabel(t) {
  return {article:'Journal Article',inproceedings:'Conference Paper',
    incollection:'Book Chapter',book:'Book',proceedings:'Proceedings',
    phdthesis:'PhD Thesis',mastersthesis:"Master's Thesis",
    misc:'Preprint / Other',techreport:'Tech Report'}[t]
    || (t ? t[0].toUpperCase()+t.slice(1) : 'Other');
}

function formatVenue(p) {
  const name = p.journal || p.booktitle;
  if (!name) return '';
  let extra = '';
  if (p.volume) extra += `, vol.\u00a0${p.volume}`;
  if (p.number) extra += `, no.\u00a0${p.number}`;
  if (p.pages)  extra += `, pp.\u00a0${p.pages}`;
  if (p.publisher) extra += ` \u00b7 ${p.publisher}`;
  if (p.note)   extra += ` \u00b7 <span style="font-style:normal;color:var(--text-dim)">${p.note}</span>`;
  return `<em>${name}</em><span class="vol-info">${extra}</span>`;
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  let pubs = [...allPubs];
  if (activeType !== 'all') {
    pubs = pubs.filter(p => {
      if (activeType === 'book') return ['book','proceedings'].includes(p.type);
      return p.type === activeType;
    });
  }
  if (activeYear) pubs = pubs.filter(p => p.year === activeYear);
  if (query) {
    const q = query.toLowerCase();
    pubs = pubs.filter(p =>
      [p.title,p.author,p.editor,p.journal,p.booktitle].some(f => f && f.toLowerCase().includes(q))
    );
  }
  pubs.sort((a,b) => sortAsc ? +a.year - +b.year : +b.year - +a.year);

  const main = document.getElementById('main');
  if (!pubs.length) {
    main.innerHTML = '<div class="status-box"><p>No publications match your current filters.</p></div>';
    return;
  }
  const byYear = {};
  pubs.forEach(p => (byYear[p.year] = byYear[p.year]||[]).push(p));
  const years = Object.keys(byYear).sort((a,b) => sortAsc ? +a-+b : +b-+a);

  main.innerHTML = years.map(yr => `
    <div class="year-group">
      <div class="year-heading">
        <span class="yr">${yr}</span>
        <span class="year-count">${byYear[yr].length} publication${byYear[yr].length>1?'s':''}</span>
      </div>
      ${byYear[yr].map(pubCard).join('')}
    </div>`).join('');
}

function pubCard(p) {
  const url = p.doi ? `https://doi.org/${p.doi}` : (p.url || null);
  const title = p.title || 'Untitled';
  const titleHtml = url
    ? `<a href="${url}" target="_blank" rel="noopener">${title}</a>`
    : title;
  const links = [];
  if (p.doi) links.push(`<a class="pub-link doi" href="https://doi.org/${p.doi}" target="_blank" rel="noopener">DOI ↗</a>`);
  if (p.url && !p.doi) links.push(`<a class="pub-link" href="${p.url}" target="_blank" rel="noopener">URL ↗</a>`);
  const venue = formatVenue(p);
  const person = p.author || p.editor || '';
  return `
  <div class="pub-card" data-type="${p.type}">
    <div class="pub-meta">
      <span class="type-badge">${typeLabel(p.type)}</span>
      <span class="pub-key">${p.key}</span>
    </div>
    <div class="pub-title">${titleHtml}</div>
    ${person ? `<div class="pub-authors">${person}</div>` : ''}
    ${venue  ? `<div class="pub-venue">${venue}</div>` : ''}
    ${links.length ? `<div class="pub-links">${links.join('')}</div>` : ''}
  </div>`;
}

function updateStats() {
  document.getElementById('stat-total').textContent    = allPubs.length;
  document.getElementById('stat-years').textContent    = new Set(allPubs.map(p=>p.year)).size;
  document.getElementById('stat-journals').textContent = allPubs.filter(p=>p.type==='article').length;
  document.getElementById('stat-conf').textContent     = allPubs.filter(p=>p.type==='inproceedings').length;
}

function updateYearFilter() {
  const years = [...new Set(allPubs.map(p=>p.year))].sort((a,b)=>+b-+a);
  document.getElementById('yearFilter').innerHTML =
    '<option value="">All Years</option>' + years.map(y=>`<option value="${y}">${y}</option>`).join('');
}

async function loadBib() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('main').innerHTML =
    '<div class="status-box"><div class="loading-ring"></div><p>Fetching latest publications…</p></div>';
  try {
    const res = await fetch(BIB_URL + '?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allPubs = parseBib(await res.text());
    updateStats(); updateYearFilter(); render();
    document.getElementById('lastUpdated').textContent = 'Fetched ' + new Date().toLocaleString();
  } catch(err) {
    document.getElementById('main').innerHTML =
      `<div class="status-box"><p>⚠️ Could not load publications.<br><small>${err.message}</small></p></div>`;
  } finally { btn.classList.remove('spinning'); }
}

document.getElementById('searchInput').addEventListener('input', e => { query = e.target.value; render(); });
document.getElementById('yearFilter').addEventListener('change', e => { activeYear = e.target.value; render(); });
document.getElementById('sortBtn').addEventListener('click', () => {
  sortAsc = !sortAsc;
  document.getElementById('sortBtn').textContent = sortAsc ? '↑ Oldest first' : '↓ Newest first';
  render();
});
document.getElementById('refreshBtn').addEventListener('click', loadBib);
document.getElementById('typeFilters').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeType = chip.dataset.type;
  render();
});

loadBib();
</script>
</body>
</html>
