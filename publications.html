<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Christoph Benzmüller — Publications</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Source+Sans+3:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #f5f4f0;
    --surface:     #ffffff;
    --border:      #dedad4;
    --border2:     #c8c3bb;
    --accent:      #2c5f8a;
    --accent-soft: rgba(44,95,138,.09);
    --text:        #1a1a1a;
    --text-muted:  #5a5550;
    --text-dim:    #9a948d;
    --journal:     #b45309;
    --journal-bg:  rgba(180,83,9,.09);
    --conf:        #2c5f8a;
    --conf-bg:     rgba(44,95,138,.09);
    --book:        #6d28d9;
    --book-bg:     rgba(109,40,217,.09);
    --misc:        #1a7a4a;
    --misc-bg:     rgba(26,122,74,.09);
    --other:       #b91c1c;
    --other-bg:    rgba(185,28,28,.09);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 3rem 2rem 2rem;
    text-align: center;
  }
  .header-kicker {
    font-family: 'JetBrains Mono', monospace;
    font-size: .68rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: .7rem;
  }
  h1 {
    font-family: 'EB Garamond', serif;
    font-size: clamp(2rem, 5vw, 3.4rem);
    font-weight: 500;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: .4rem;
  }
  .subtitle { color: var(--text-muted); font-size: .92rem; margin-bottom: 1.8rem; }
  .stats-row {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    background: var(--bg);
  }
  .stat { padding: .55rem 1.3rem; text-align: center; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .stat-n { font-family: 'EB Garamond', serif; font-size: 1.75rem; font-weight: 500; color: var(--accent); line-height: 1; display: block; }
  .stat-label { font-size: .68rem; color: var(--text-dim); letter-spacing: .04em; text-transform: uppercase; }

  /* ── TOOLBAR ── */
  .toolbar {
    position: sticky; top: 3rem; z-index: 100;
    background: rgba(245,244,240,.96);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: .6rem 2rem;
  }
  .toolbar-inner { max-width: 980px; margin: 0 auto; display: flex; gap: .55rem; align-items: center; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 160px; position: relative; }
  .search-wrap svg { position: absolute; left: .7rem; top: 50%; transform: translateY(-50%); color: var(--text-dim); pointer-events: none; }
  input[type="search"] {
    width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: 'Source Sans 3', sans-serif; font-size: .88rem;
    padding: .42rem .7rem .42rem 2rem; outline: none; transition: border-color .15s, box-shadow .15s;
  }
  input[type="search"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  input[type="search"]::placeholder { color: var(--text-dim); }
  select {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: 'Source Sans 3', sans-serif; font-size: .85rem;
    padding: .42rem .8rem; outline: none; cursor: pointer;
  }
  .tb-btn {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size: .7rem;
    padding: .42rem .8rem; cursor: pointer; transition: all .15s; white-space: nowrap;
    display: inline-flex; align-items: center; gap: .3rem;
  }
  .tb-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .refresh-btn.spinning svg { animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── CHIPS ── */
  .type-filters { max-width: 980px; margin: 1rem auto 0; padding: 0 2rem; display: flex; gap: .35rem; flex-wrap: wrap; }
  .chip {
    display: inline-flex; align-items: center; gap: .3rem;
    padding: .22rem .7rem; border-radius: 999px; border: 1px solid var(--border);
    font-size: .74rem; font-family: 'Source Sans 3', sans-serif; cursor: pointer;
    transition: all .15s; color: var(--text-muted); background: var(--surface); user-select: none;
  }
  .chip:hover { border-color: var(--border2); color: var(--text); }
  .chip.active { font-weight: 600; border-width: 1.5px; }
  .chip[data-type="all"].active      { background: var(--text);       border-color: var(--text);    color: #fff; }
  .chip[data-type="article"].active  { background: var(--journal-bg); border-color: var(--journal); color: var(--journal); }
  .chip[data-type="inproceedings"].active { background: var(--conf-bg); border-color: var(--conf); color: var(--conf); }
  .chip[data-type="incollection"].active,
  .chip[data-type="book"].active     { background: var(--book-bg); border-color: var(--book); color: var(--book); }
  .chip[data-type="misc"].active     { background: var(--misc-bg); border-color: var(--misc); color: var(--misc); }
  .chip-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

  /* ── MAIN ── */
  main { max-width: 980px; margin: 1.5rem auto; padding: 0 2rem 5rem; }

  .year-group { margin-bottom: 2rem; }
  .year-heading {
    display: flex; align-items: baseline; gap: .6rem;
    border-bottom: 2px solid var(--border); padding-bottom: .3rem; margin-bottom: .6rem;
  }
  .yr { font-family: 'EB Garamond', serif; font-size: 1.4rem; font-weight: 500; color: var(--text); line-height: 1; }
  .year-count { font-size: .75rem; color: var(--text-dim); }

  /* ── PUB ROW (compact) ── */
  .pub-row {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0 .7rem;
    padding: .35rem 0 .35rem .6rem;
    border-left: 3px solid transparent;
    margin-bottom: .15rem;
    transition: border-color .12s;
  }
  .pub-row:hover { border-left-color: var(--border2); }
  .pub-row[data-type="article"]      { border-left-color: var(--journal); }
  .pub-row[data-type="inproceedings"] { border-left-color: var(--conf); }
  .pub-row[data-type="incollection"],
  .pub-row[data-type="book"],
  .pub-row[data-type="proceedings"]  { border-left-color: var(--book); }
  .pub-row[data-type="misc"]         { border-left-color: var(--misc); }
  .pub-row[data-type="techreport"],
  .pub-row[data-type="phdthesis"]    { border-left-color: var(--other); }

  /* left column: badge + key */
  .pub-left {
    display: flex; flex-direction: column; align-items: flex-end;
    gap: .15rem; padding-top: .1rem; min-width: 0;
  }
  .type-badge {
    font-size: .6rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
    padding: .08rem .4rem; border-radius: 3px; white-space: nowrap;
  }
  [data-type="article"]      .type-badge { background: var(--journal-bg); color: var(--journal); }
  [data-type="inproceedings"] .type-badge { background: var(--conf-bg); color: var(--conf); }
  [data-type="incollection"]  .type-badge,
  [data-type="book"]          .type-badge,
  [data-type="proceedings"]   .type-badge { background: var(--book-bg); color: var(--book); }
  [data-type="misc"]          .type-badge { background: var(--misc-bg); color: var(--misc); }
  [data-type="techreport"]    .type-badge,
  [data-type="phdthesis"]     .type-badge { background: var(--other-bg); color: var(--other); }

  .pub-key {
    font-family: 'JetBrains Mono', monospace; font-size: .58rem;
    color: var(--text-dim); white-space: nowrap;
  }

  /* right column: all text */
  .pub-body { min-width: 0; }

  .pub-title {
    font-family: 'EB Garamond', serif; font-size: 1rem; font-weight: 500;
    line-height: 1.3; color: var(--text);
  }
  .pub-title a { color: inherit; text-decoration: none; border-bottom: 1px solid transparent; transition: color .12s, border-color .12s; }
  .pub-title a:hover { color: var(--accent); border-bottom-color: var(--accent); }

  .pub-meta-line {
    font-size: .8rem; color: var(--text-muted); line-height: 1.35; margin-top: .1rem;
  }
  .pub-meta-line em { font-style: italic; }
  .pub-meta-line .vol-info { color: var(--text-dim); }

  /* action links row */
  .pub-actions { display: flex; align-items: center; gap: .3rem; margin-top: .22rem; flex-wrap: wrap; }
  .act-link {
    font-family: 'JetBrains Mono', monospace; font-size: .62rem;
    padding: .1rem .45rem; border-radius: 4px; border: 1px solid var(--border);
    color: var(--text-dim); text-decoration: none; transition: all .12s; cursor: pointer;
    background: transparent; line-height: 1.4;
  }
  .act-link:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .act-link.doi-link { border-color: rgba(44,95,138,.35); color: var(--accent); }
  .act-link.doi-link:hover { background: var(--accent-soft); }
  .act-link.bib-toggle { cursor: pointer; }
  .act-link.bib-toggle.open { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

  /* BibTeX dropdown */
  .bib-box {
    display: none; margin-top: .35rem; position: relative;
    background: #f8f7f4; border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
  }
  .bib-box.open { display: block; }
  .bib-pre {
    font-family: 'JetBrains Mono', monospace; font-size: .7rem;
    line-height: 1.55; color: var(--text-muted);
    padding: .6rem .8rem; overflow-x: auto; white-space: pre;
    max-height: 260px; overflow-y: auto;
  }
  .bib-copy {
    position: absolute; top: .35rem; right: .45rem;
    font-family: 'JetBrains Mono', monospace; font-size: .6rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-dim); padding: .1rem .45rem; cursor: pointer; transition: all .12s;
  }
  .bib-copy:hover { border-color: var(--accent); color: var(--accent); }

  /* ── STATUS ── */
  .status-box { text-align: center; padding: 5rem 2rem; color: var(--text-muted); }
  .loading-ring {
    display: inline-block; width: 36px; height: 36px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 1rem;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center; padding: 1.3rem 2rem;
    color: var(--text-dim); font-size: .76rem;
    border-top: 1px solid var(--border); background: var(--surface);
  }
  footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 580px) {
    header { padding: 2rem 1rem 1.5rem; }
    main, .type-filters { padding-left: 1rem; padding-right: 1rem; }
    .toolbar { padding: .5rem 1rem; }
    .pub-row { grid-template-columns: 1fr; }
    .pub-left { flex-direction: row; align-items: center; margin-bottom: .2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); width: 100%; border-radius: 8px; }
    .stat { border-right: none; border-bottom: 1px solid var(--border); padding: .4rem .5rem; }
    .stat:nth-child(3n+1), .stat:nth-child(3n+2) { border-right: 1px solid var(--border); }
    .stat:last-child { border-bottom: none; }
    .stat-n { font-size: 1.3rem; }
    .stat-label { font-size: .58rem; }
  }

    /* ── TOP NAV ── */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }
  .nav-inner {
    max-width: 980px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 3.2rem;
  }
  .nav-name {
    font-family: 'EB Garamond', serif;
    font-size: 1.15rem; font-weight: 500;
    color: var(--text); text-decoration: none;
    white-space: nowrap; flex-shrink: 0;
  }
  .nav-links { display: flex; gap: .2rem; flex-wrap: nowrap; align-items: center; }
  .nav-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: .7rem; letter-spacing: .05em; text-transform: uppercase;
    color: var(--text-muted); text-decoration: none;
    padding: .4rem .75rem; border-radius: 6px;
    transition: all .15s; white-space: nowrap;
  }
  .nav-link:hover { background: var(--accent-soft); color: var(--accent); }
  .nav-link.active { color: var(--accent); background: var(--accent-soft); }
  @media (max-width: 600px) {
    nav { padding: 0 .75rem; }
    .nav-inner { flex-direction: column; align-items: flex-start;
                 height: auto; padding: .5rem 0; gap: .3rem; }
    .nav-name { font-size: .95rem; }
    .nav-links { flex-wrap: wrap; gap: .2rem; }
    .nav-link { padding: .28rem .5rem; font-size: .63rem; }
  }
    .nav-links { flex-wrap: wrap; gap: .15rem; width: 100%; }
    .nav-link { padding: .22rem .4rem; font-size: .58rem; }
  }
    .nav-inner { flex-direction: column; align-items: flex-start;
                 height: auto; padding: .4rem 0; gap: .25rem; }
    .nav-name { font-size: .9rem; }
    .nav-link { padding: .25rem .45rem; font-size: .6rem; }
  }

    .subtitle .full { display: inline; }
    .subtitle .short { display: none; }
    @media (max-width: 480px) {
      .subtitle .full { display: none; }
      .subtitle .short { display: inline; }
    }
  @media (max-width: 600px) {
    nav { padding: 0 .75rem; }
    .nav-inner { flex-direction: column; align-items: flex-start;
                 height: auto; padding: .5rem 0; gap: .3rem; }
    .nav-name { font-size: .95rem; white-space: nowrap; }
    .nav-links { flex-wrap: wrap; gap: .2rem; }
    .nav-link { padding: .28rem .5rem; font-size: .63rem; }
  }
  .full { display: inline; }
  .short { display: none; }
  @media (max-width: 480px) {
    .full { display: none; }
    .short { display: inline; }
  }
</style>

    try{
      const{val,end}=extractValue(rest,eqPos);fnRe.lastIndex=end;
      let trimmed=val.trim();if(!trimmed)continue;
      if((flo==='note'||flo==='annote')&&trimmed.includes('<a ')){
        const parts=[];const re=/<a\s[^>]*href="([^"]+)"[^>]*>([^<]+)<\/a>/gi;let m;
        while((m=re.exec(trimmed))!==null)parts.push(m[2].trim()+': '+m[1].trim());
        trimmed=parts.length>0?parts.join('; '):trimmed.replace(/<[^>]+>/g,'').trim();
        if(!trimmed)continue;
      }
      try{const formatted=String(parseInt(trimmed,10))===trimmed?trimmed:'{'+trimmed+'}';lines.push(`  ${flo.padEnd(12)} = ${formatted}`);}
      catch(_){lines.push(`  ${flo.padEnd(12)} = {${trimmed}}`);}
    }catch(_){}
  }

return `@${type}{${key},\n${lines.join(',\n')}\n}`;
}

// Parse all bib entries and build sanitized BibTeX for display.
function parseBib(raw) {
  const entries = [];
  const re = /@(\w+)\s*\{/gi;
  let m;
  while ((m = re.exec(raw)) !== null) {
    const type = m[1].toLowerCase();
    if (['string','comment','preamble'].includes(type)) continue;
    let i = m.index + m[0].length;
    let depth = 1, bodyStart = i;
    while (i < raw.length && depth > 0) {
      if (raw[i] === '{') depth++;
      else if (raw[i] === '}') depth--;
      i++;
    }
    const body = raw.slice(bodyStart, i-1);
    const comma = body.indexOf(',');
    if (comma < 0) continue;
    const key = body.slice(0, comma).trim();
    const rest = body.slice(comma+1);

    const entry = { type, key };
    const fnRe = /\b([A-Za-z_]\w*)\s*=/g;
    let fm;
    while ((fm = fnRe.exec(rest)) !== null) {
      const fname = fm[1].toLowerCase();
      if (isSkippedField(fname)) continue;
      const eqPos = fm.index + fm[0].length;
      try {
        const { val } = extractValue(rest, eqPos);
        if (val) entry[fname] = cleanLatex(val);
      } catch(_) {}
    }
    if (entry.title && entry.year) {
      entry._raw = sanitizeBib(type, key, rest);
      entries.push(entry);
    }
  }
  return entries;
}

// ── Helpers ───────────────────────────────────────────────────────────────
function typeLabel(t) {
  return {article:'Journal',inproceedings:'Conference',incollection:'Book Ch.',
    book:'Book',proceedings:'Proceedings',phdthesis:'PhD Thesis',
    mastersthesis:"MSc Thesis",misc:'Preprint',techreport:'Tech Rep.'}[t]
    || (t ? t[0].toUpperCase()+t.slice(1) : 'Other');
}

function metaLine(p) {
  // Authors (shortened: first author et al. if >2)
  let authors = '';
  if (p.author || p.editor) {
    const raw = p.author || p.editor;
    // Split on ' and ' (case-insensitive)
    const parts = raw.split(/\s+and\s+/i).map(s => {
      // Last, First → First Last
      const [last, first] = s.split(',').map(x => x.trim());
      return first ? `${first} ${last}` : last;
    });
    authors = parts.length > 3
      ? parts[0] + ' et al.'
      : parts.join(', ');
    if (p.editor && !p.author) authors += ' (eds.)';
  }

  // Venue
  let venue = '';
  if (p.journal) {
    venue = `<em>${p.journal}</em>`;
    if (p.volume) venue += ` <span class="vol-info">${p.volume}`;
    if (p.number) venue += `(${p.number})`;
    if (p.pages)  venue += `, ${p.pages}`;
    if (p.volume) venue += `</span>`;
  } else if (p.booktitle) {
    venue = `<em>${p.booktitle}</em>`;
    if (p.pages) venue += ` <span class="vol-info">pp. ${p.pages}</span>`;
  }

  const parts = [authors, venue].filter(Boolean);
  if (p.note) parts.push(`<span class="vol-info">${p.note}</span>`);
  return parts.join(' · ');
}

// Escape HTML for display in <pre>
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  let pubs = [...allPubs];
  if (activeType !== 'all') {
    pubs = pubs.filter(p => {
      if (activeType === 'book') return ['book','proceedings'].includes(p.type);
      return p.type === activeType;
    });
  }
  if (activeYear) pubs = pubs.filter(p => p.year === activeYear);
  if (query) {
    const q = query.toLowerCase();
    pubs = pubs.filter(p =>
      [p.title,p.author,p.editor,p.journal,p.booktitle].some(f => f && f.toLowerCase().includes(q))
    );
  }
  pubs.sort((a,b) => sortAsc ? +a.year - +b.year : +b.year - +a.year);

  const main = document.getElementById('main');
  if (!pubs.length) {
    main.innerHTML = '<div class="status-box"><p>No publications match your current filters.</p></div>';
    return;
  }
  const byYear = {};
  pubs.forEach(p => (byYear[p.year] = byYear[p.year]||[]).push(p));
  const years = Object.keys(byYear).sort((a,b) => sortAsc ? +a-+b : +b-+a);

  main.innerHTML = years.map(yr => `
    <div class="year-group">
      <div class="year-heading">
        <span class="yr">${yr}</span>
        <span class="year-count">${byYear[yr].length} publication${byYear[yr].length>1?'s':''}</span>
      </div>
      ${byYear[yr].map(pubRow).join('')}
    </div>`).join('');
}

function pubRow(p) {
  // Title link: prefer DOI, then URL
  const href = p.doi ? `https://doi.org/${p.doi}` : (p.url || null);
  const title = p.title || 'Untitled';
  const titleHtml = href
    ? `<a href="${href}" target="_blank" rel="noopener">${title}</a>`
    : title;

  // Action links
  const acts = [];
  if (p.doi) acts.push(`<a class="act-link doi-link" href="https://doi.org/${p.doi}" target="_blank" rel="noopener">DOI ↗</a>`);
  if (p.url) acts.push(`<a class="act-link" href="${p.url}" target="_blank" rel="noopener">URL ↗</a>`);
  // BibTeX toggle button
  const bibId = 'bib-' + p.key.replace(/[^a-zA-Z0-9]/g,'_');
  acts.push(`<button class="act-link bib-toggle" onclick="toggleBib('${bibId}',this)">BibTeX</button>`);

  const ml = metaLine(p);

  return `
  <div class="pub-row" data-type="${p.type}">
    <div class="pub-left">
      <span class="type-badge">${typeLabel(p.type)}</span>
      <span class="pub-key">${p.key}</span>
    </div>
    <div class="pub-body">
      <div class="pub-title">${titleHtml}</div>
      ${ml ? `<div class="pub-meta-line">${ml}</div>` : ''}
      <div class="pub-actions">${acts.join('')}</div>
      <div class="bib-box" id="${bibId}">
        <pre class="bib-pre">${escHtml(p._raw)}</pre>
        <button class="bib-copy" onclick="copyBib('${bibId}')">Copy</button>
      </div>
    </div>
  </div>`;
}

function toggleBib(id, btn) {
  const box = document.getElementById(id);
  const open = box.classList.toggle('open');
  btn.classList.toggle('open', open);
}

function copyBib(id) {
  const text = document.getElementById(id).querySelector('.bib-pre').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(id).querySelector('.bib-copy');
    const prev = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = prev, 1500);
  });
}

function updateStats() {
  document.getElementById('stat-total').textContent    = allPubs.length;
  document.getElementById('stat-years').textContent    = new Set(allPubs.map(p=>p.year)).size;
  document.getElementById('stat-journals').textContent = allPubs.filter(p=>p.type==='article').length;
  document.getElementById('stat-conf').textContent     = allPubs.filter(p=>['inproceedings','workshop'].includes(p.type)).length;
  document.getElementById('stat-chapters').textContent = allPubs.filter(p=>p.type==='incollection').length;
  document.getElementById('stat-books').textContent    = allPubs.filter(p=>['book','proceedings'].includes(p.type)).length;
  document.getElementById('stat-preprints').textContent= allPubs.filter(p=>p.type==='misc').length;
}

function updateYearFilter() {
  const years = [...new Set(allPubs.map(p=>p.year))].sort((a,b)=>+b-+a);
  document.getElementById('yearFilter').innerHTML =
    '<option value="">All Years</option>' + years.map(y=>`<option value="${y}">${y}</option>`).join('');
}

async function loadBib() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('main').innerHTML =
    '<div class="status-box"><div class="loading-ring"></div><p>Fetching latest publications…</p></div>';
  try {
    const res = await fetch(BIB_URL + '?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allPubs = parseBib(await res.text());
    updateStats(); updateYearFilter(); render();
    document.getElementById('lastUpdated').textContent = 'Fetched ' + new Date().toLocaleString();
  } catch(err) {
    document.getElementById('main').innerHTML =
      `<div class="status-box"><p>⚠️ Could not load publications.<br><small>${err.message}</small></p></div>`;
  } finally { btn.classList.remove('spinning'); }
}

document.getElementById('searchInput').addEventListener('input', e => { query = e.target.value; render(); });
document.getElementById('yearFilter').addEventListener('change', e => { activeYear = e.target.value; render(); });
document.getElementById('sortBtn').addEventListener('click', () => {
  sortAsc = !sortAsc;
  document.getElementById('sortBtn').textContent = sortAsc ? '↑ Oldest first' : '↓ Newest first';
  render();
});
document.getElementById('refreshBtn').addEventListener('click', loadBib);
document.getElementById('typeFilters').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeType = chip.dataset.type;
  render();
});

loadBib();
</script>
